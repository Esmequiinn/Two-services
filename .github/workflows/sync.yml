name: Weekly Upstream Sync

on:
  schedule:
    - cron: "0 0 * * 0"  # cada domingo
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Save custom manifest
        run: cp manifest.json /tmp/manifest.json

      - name: Add upstream
        run: |
          git remote add upstream https://github.com/D3adlyRocket/All-in-One-Nuvio.git
          git fetch upstream

      - name: Sync upstream
        id: sync
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          if ! git merge upstream/main --no-edit; then
            echo "conflict=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          cp /tmp/manifest.json manifest.json

          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git add .
            git commit -m "Weekly upstream sync"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create issue on conflict
        if: steps.sync.outputs.conflict == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "Upstream sync conflict",
              body: "Hubo un conflicto al sincronizar automáticamente el upstream. Revisión manual necesaria."
            })
